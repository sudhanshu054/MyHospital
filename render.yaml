# Render deployment definition
# Deploy with: https://dashboard.render.com (New -> Blueprint -> connect repo)
# Set the secret env vars (OPENAI_API_KEY, JWT_SECRET, MYSQL_*, etc.) in the Render dashboard.

services:
  - type: web
    name: hospital-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: starter
    healthCheckPath: /api/openapi
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: docker
      - key: MYSQL_HOST
        fromDatabase:
          name: hospital-db
          property: host
      - key: MYSQL_USER
        value: root
      - key: MYSQL_PASSWORD
        sync: false
      - key: REDIS_HOST
        fromService:
          type: redis
          name: hospital-redis
          property: host
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_API_MODEL
        value: gpt-4o-mini
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: hospital-frontend
          property: url

  - type: redis
    name: hospital-redis
    plan: starter
    ipAllowList: []

  - type: web
    name: hospital-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: hospital-backend
          property: url
        prefix: /api

databases:
  - name: hospital-db
    databaseName: hospital_management
    plan: starter
