server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/hospital_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}

jwt:
  secret: changeitsecurekeyforprodchangekey123456
  expiration-ms: 86400000
  refresh-expiration-ms: 2592000000

openai:
  api:
    key: ${OPENAI_API_KEY:}
    model: ${OPENAI_API_MODEL:gpt-4o-mini}
  timeout-ms: 20000

springdoc:
  api-docs:
    path: /api/openapi
  swagger-ui:
    path: /swagger-ui.html

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
