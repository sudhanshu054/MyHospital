server:
  port: ${PORT:8080}

spring:
  datasource:
    # Defaults keep local Docker Compose on MySQL. Set DATABASE_TYPE=postgresql
    # and the DATABASE_* variables when using Render Postgres.
    url: jdbc:${DATABASE_TYPE:mysql}://${DATABASE_HOST:${MYSQL_HOST:localhost}}:${DATABASE_PORT:3306}/${DATABASE_NAME:hospital_management}
    username: ${DATABASE_USER:${MYSQL_USER:root}}
    password: ${DATABASE_PASSWORD:${MYSQL_PASSWORD:root}}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:}
  expiration-ms: 86400000
  refresh-expiration-ms: 2592000000

openai:
  api:
    key: ${OPENAI_API_KEY:}
    model: ${OPENAI_API_MODEL:gpt-4o-mini}
  timeout-ms: 20000

springdoc:
  api-docs:
    path: /api/openapi
  swagger-ui:
    path: /swagger-ui.html

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
