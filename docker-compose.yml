version: '3.8'

services:
  mysql:
    image: mysql:8.1
    environment:
      MYSQL_DATABASE: hospital_management
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  hospital-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '8080:10000'
    environment:
      PORT: 10000
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in the root .env file (at least 32 bytes)}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_MODEL: ${OPENAI_API_MODEL:-gpt-4o-mini}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3000:80'
    depends_on:
      - hospital-backend

volumes:
  mysql-data:
